<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Total Package Interview</title>
    <link rel="canonical" href="https://www.totalpackageinterview.com/login">

    <!-- Preload Critical Font -->
    <link rel="preload"
        href="https://fonts.gstatic.com/s/inter/v13/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuGkyMZhrib2Bg-4.woff2"
        as="font" type="font/woff2" crossorigin>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Inlined critical CSS to eliminate network request -->
    <style>
        :root {
            --primary: #0f172a;
            --primary-light: #1e293b;
            --accent: #20C997;
            --accent-glow: rgba(32, 201, 151, 0.5);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --white: #ffffff;
            --error: #ef4444;
            --success: #20C997;
            --gradient-bg: radial-gradient(circle at 50% 0%, #1e3a8a 0%, #0f172a 100%);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--primary);
            background-image: var(--gradient-bg);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            margin: 0;
            color: var(--text-main);
        }

        .login-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            position: relative;
            overflow: hidden;
        }

        .logo {
            display: column;
            align-items: center;
            line-height: 1;
            margin-bottom: 2rem;
            text-align: center;
        }

        .logo .top-line {
            font-size: 0.875rem;
            color: var(--accent);
            text-transform: lowercase;
            font-weight: 700;
            text-shadow: 0 0 10px var(--accent-glow);
            margin-bottom: 2px;
        }

        .logo .bottom-line {
            font-size: 1.75rem;
            color: var(--white);
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 0.05em;
        }

        h1 {
            text-align: center;
            font-size: 1.75rem;
            color: var(--white);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 1rem;
            color: var(--white);
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn:hover {
            background: #34d399;
            transform: translateY(-2px);
            box-shadow: 0 0 25px var(--accent-glow);
        }

        .btn-google {
            width: 100%;
            padding: 0.875rem;
            background: #ffffff;
            color: #1e293b;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: #94a3b8;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .divider span {
            padding: 0 1rem;
            font-size: 0.9rem;
        }

        .signup-link {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
        }

        .signup-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .alert {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
        }

        .alert.error {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .alert.show {
            display: block;
        }

        /* Mobile Performance Optimization */
        @media (max-width: 640px) {
            .login-container {
                backdrop-filter: none;
                background: rgba(30, 41, 59, 0.95);
                margin: 0 1rem;
                padding: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo">
            <span class="top-line">total package</span>
            <span class="bottom-line">INTERVIEW</span>
        </div>
        <h1>Welcome Back</h1>
        <p class="subtitle">Log in to your account</p>

        <div id="alert" class="alert"></div>

        <button type="button" class="btn-google" id="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"
                style="width: 20px;">
            Continue with Google
        </button>

        <div class="divider">
            <span>or use email</span>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-container">
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <!-- Inline SVG Eye instead of FA -->
                    <svg id="togglePassword" class="password-toggle"
                        style="width:20px; height:20px; position:absolute; right:15px; top:50%; transform:translateY(-50%); cursor:pointer; color:var(--text-muted);"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path
                            d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                        </path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                </div>
                <div class="forgot-link">
                    <a href="/forgot-password">Forgot password?</a>
                </div>
            </div>
            <button type="submit" class="btn" id="submit-btn" style="position: relative; z-index: 10;">Login</button>
        </form>

        <div class="signup-link">
            <p>Don't have an account? <a href="/signup">Sign up</a></p>
        </div>

        <a href="/" class="back-link">← Back to Home</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://nvfjmqacxzlmfamiynuu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52ZmptcWFjeHpsbWZhbWl5bnV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUxMzk3MzAsImV4cCI6MjA4MDcxNTczMH0.W3J-E2ldrc99btVeChF0SauTQxr_48uFwImVaoHfOXI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('login-form');
        const alertEl = document.getElementById('alert');
        const submitBtn = document.getElementById('submit-btn');
        const googleBtn = document.getElementById('google-btn');

        googleBtn.addEventListener('click', async () => {
            console.log("[AUTH] Initiating Google Sign-In");
            const { data, error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + '/dashboard',
                    queryParams: {
                        access_type: 'offline',
                        prompt: 'consent',
                    }
                }
            });
            if (error) {
                showAlert("Google login failed: " + error.message, "error");
            }
        });

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('signup') === 'success') {
            showAlert('Account created successfully! Please log in below to access your dashboard.', 'success');
        }

        function showAlert(message, type) {
            alertEl.textContent = message;
            alertEl.className = `alert ${type} show`;
        }

        function hideAlert() {
            alertEl.className = 'alert';
        }

        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', function () {
                // Toggle the type attribute
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);

                if (type === 'password') {
                    // Hidden state: Show eye-slash
                    this.classList.remove('fa-eye');
                    this.classList.add('fa-eye-slash');
                } else {
                    // Visible state: Show regular eye
                    this.classList.remove('fa-eye-slash');
                    this.classList.add('fa-eye');
                }
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showAlert('Please enter your email and password.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';

            try {
                // Use Supabase SDK directly
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    console.error('Login Error:', error.message);
                    showAlert(error.message, 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Login';
                    return;
                }

                console.log('Login Successful', data);

                if (data.session) {
                    const session = data.session;
                    const user = data.user;

                    // Legacy session sync for existing dashboard logic
                    localStorage.setItem('supabase.auth.token', session.access_token);
                    localStorage.setItem('supabase.auth.refresh_token', session.refresh_token);

                    const sessionData = {
                        ...user,
                        access_token: session.access_token,
                        refresh_token: session.refresh_token,
                        logged_in_at: Date.now()
                    };
                    localStorage.setItem('aceinterview_session', JSON.stringify(sessionData));

                    // Redirect
                    if (user.user_metadata?.role === 'admin' || user.email === 'david@aceinterview.ai') {
                        window.location.href = '/admin';
                    } else {
                        window.location.href = '/dashboard';
                    }
                } else {
                    showAlert('Session not created. Please try again.', 'error');
                    submitBtn.disabled = false;
                }

            } catch (err) {
                console.error('Unexpected error:', err);
                showAlert('Login failed. Please try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login';
            }
        });
    </script>

</body>

</html>
